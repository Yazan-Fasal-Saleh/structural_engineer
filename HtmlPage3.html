<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <title>الصفحة الرئيسية</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Cairo", sans-serif;
        }

        body {
            background: #f1f5f9;
            padding: 40px 20px;
        }

        /* Grid Layout */
        .products {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        /* Card Style */
        .card {
            background: #ffffff;
            border-radius: 14px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: 0.3s;
            border: 1px solid #e2e8f0;
        }

        .card:hover {
            transform: translateY(-6px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }

        .card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 12px;
        }

        .card h3 {
            color: #0f172a;
            margin-bottom: 8px;
        }

        .card p {
            color: #475569;
            margin-bottom: 15px;
            font-size: 17px;
        }

        /* Button */
        .card button {
            background: #2563eb;
            color: white;
            padding: 12px 28px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }

        .card button:hover {
            background: #1d4ed8;
        }
    </style>
</head>

<body>

    <!-- First Row -->
    <section class="products">
        <div class="card">
            <a href="10x19.5m-1.jpg">
                <img src="10x19.5m-1.jpg" alt="مخطط عمارة" />
            </a>
            <h3>$45000.99</h3>
            <p>مخطط عمارة سكنية طابقين</p>
            <button onclick="alert('تمت العملية بنجاح')">إضافة</button>
        </div>

        <div class="card">
            <a href="مخططات-فلل-دورين-500متر.png">
                <img src="مخططات-فلل-دورين-500متر.png" alt="مخطط فلل" />
            </a>
            <h3>$50000.99</h3>
            <p>مخطط فلل</p>
            <button onclick="alert('تمت العملية بنجاح')">إضافة</button>
        </div>

        <div class="card">
            <a href="57-3.jpg">
                <img src="57-3.jpg" alt="تصميم مستشفى" />
            </a>
            <h3>$149000.99</h3>
            <p>دراسة تصميم مستشفى</p>
            <button onclick="alert('تمت العملية بنجاح')">إضافة</button>
        </div>
    </section>

    <!-- Second Row -->
    <section class="products">
        <div class="card">
            <a href="57-1.jpg">
                <img src="57-1.jpg" alt="محطة بنزين" />
            </a>
            <h3>$20000.99</h3>
            <p>دراسة تصميم محطة بنزين</p>
            <button onclick="alert('تمت العملية بنجاح')">إضافة</button>
        </div>

        <div class="card">
            <a href="w.jpg">
                <img src="w.jpg" alt="عمارة داخلية" />
            </a>
            <h3>$5000.99</h3>
            <p>عمارة الداخلية</p>
            <button onclick="alert('تمت العملية بنجاح')">إضافة</button>
        </div>

        <div class="card">
            <a href="FB_IMG_16885998365642213.jpg">
                <img src="FB_IMG_16885998365642213.jpg" alt="مخطط الدور الأرضي" />
            </a>
            <h3>$2000.99</h3>
            <p>مخطط الدور الأرضي</p>
            <button onclick="alert('تمت العملية بنجاح')">إضافة</button>
        </div>
    </section>

</body>
</html>
