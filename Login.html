<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تسجيل دخول</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Cairo", sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Card */
        .card {
            width: 380px;
            padding: 35px 30px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 18px;
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 25px rgba(0,0,0,0.3);
            animation: fadeIn 1.2s ease;
        }

        .card h2 {
            text-align: center;
            color: #38bdf8;
            margin-bottom: 25px;
            font-size: 32px;
            font-weight: 800;
        }

        /* Input Fields */
        .input-box {
            margin-bottom: 22px;
        }

        .input-box label {
            color: #e2e8f0;
            font-size: 18px;
            font-weight: 600;
        }

        .input-box input {
            width: 100%;
            padding: 12px 14px;
            margin-top: 8px;
            border-radius: 10px;
            border: none;
            outline: none;
            background: rgba(255, 255, 255, 0.15);
            color: white;
            font-size: 17px;
            transition: 0.3s;
        }

        .input-box input:focus {
            background: rgba(255, 255, 255, 0.25);
            box-shadow: 0 0 10px #38bdf8;
        }

        /* Button */
        .btn {
            width: 100%;
            padding: 12px;
            background: #38bdf8;
            border: none;
            border-radius: 10px;
            color: #0f172a;
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn:hover {
            background: #0ea5e9;
        }

        /* Animation */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(25px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body>

    <div class="card">
        <h2>Login</h2>

        <div class="input-box">
            <label>اسم المستخدم</label>
            <input type="text" id="UserName" placeholder="UserName">
        </div>

        <div class="input-box">
            <label>كلمة المرور</label>
            <input type="password" id="Password" placeholder="Password">
        </div>

        <button class="btn" onclick="alert('Welcome')">تسجيل الدخول</button>
    </div>

</body>
</html>
