<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <link href="StyleSheet1.css" rel="stylesheet" />
    <title>انشاء حساب</title>
</head>
<body style="background-color:#808080;text-align:center; margin:140px 450px;">
    
    <div class="DivForm">
        <form action="HtmlPage2.html" method="get">
     <h1 style="color:black">SignUp</h1>
        <br />
      FirstName:  <input type="text" id="FirstName" class="FN" title="FirstName" placeholder="FirstName" /><br />
      LastName:  <input type="text" id="LastName"  class="LN" title="LastName" placeholder="LastName" />
        <br />
       Email: <input type="email" id="Email" class="em" title="email" placeholder="Email" />
        <br />
        Country: <select id="country" name="country" >
            <option value="sy">Syria</option>
            <option value="au">Australia</option>
            <option value="ca">Canada</option>
            <option value="usa">USA</option>
                 </select>
        <br />
        Gender:<input type="radio" id="g1" name="gend"/>
        <label for="g1">Male</label>
        <input type="radio" id="g2" name="gend"/>
        <label for="g2">Female</label>
        <br />
        NumberPhone: <input type="number" id="numberPhone" title="NumberPhone" />
        <br />
        password: <input type="password" id="Password"  title="Password" placeholder="Password" />
       <br />
            <br />
        <input type="submit" value="Submit" class="btn" onclick="alert('Welcome'+' '+window.FirstName.value+' '+window.LastName.value)" />
            </form>
            </div>
</body>
</html>
